<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Cá Nhân - Music App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #f8f9fa; 
            color: #212529; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .sidebar { 
            background-color: #ffffff; 
            height: 100vh; 
            padding: 20px; 
            position: fixed; 
            width: 240px; 
            border-right: 1px solid #dee2e6;
        }
        .main-content { 
            margin-left: 260px; 
            padding: 30px; 
        }
        .nav-link { 
            color: #495057; 
            font-weight: 600; 
            padding: 10px 15px; 
            border-radius: 6px; 
            margin-bottom: 5px; 
            display: block; 
            text-decoration: none; 
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active { 
            color: #1DB954; 
            background-color: #e9ecef; 
        }
        .nav-link i { 
            margin-right: 15px; 
            width: 20px; 
        }
        .card-custom { 
            background-color: #ffffff; 
            border: 1px solid #e0e0e0; 
            transition: transform 0.2s, box-shadow 0.2s; 
            cursor: pointer; 
            border-radius: 8px; 
            padding: 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card-custom:hover { 
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card-custom img { 
            width: 100%; 
            border-radius: 6px; 
            aspect-ratio: 1; 
            object-fit: cover; 
            margin-bottom: 15px; 
        }
        .card-title { 
            font-size: 16px; 
            font-weight: 700; 
            margin-bottom: 5px; 
            color: #212529;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .card-subtitle { 
            color: #6c757d; 
            font-size: 14px; 
        }
        .header-title { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 25px; 
            color: #1DB954; 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="text-dark mb-4 fw-bold"><i class="fa-solid fa-music text-success me-2"></i> Thư Viện</h4>
        <nav>
            <a href="#" class="nav-link active" onclick="loadData('all-songs', this)"><i class="fa-solid fa-record-vinyl"></i>Bài hát cá nhân</a>
            <a href="#" class="nav-link" onclick="loadData('playlists', this)"><i class="fa-solid fa-list"></i>Playlist của tôi</a>
            <a href="#" class="nav-link" onclick="loadData('albums', this)"><i class="fa-solid fa-compact-disc"></i>Album đã lưu</a>
            <a href="#" class="nav-link" onclick="loadData('favorites', this)"><i class="fa-solid fa-heart text-danger"></i>Bài hát yêu thích</a>
        </nav>
    </div>

    <div class="main-content">
        <div id="content-title" class="header-title">Bài hát cá nhân</div>
        <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4" id="data-wrapper">
            </div>
    </div>

    <script>
        function loadData(tabName, element) {
            document.querySelectorAll('.nav-link').forEach(nav => nav.classList.remove('active'));
            element.classList.add('active');

            const titleMap = {
                'all-songs': 'Bài hát cá nhân',
                'playlists': 'Playlist của tôi',
                'albums': 'Album đã lưu',
                'favorites': 'Bài hát yêu thích'
            };
            document.getElementById('content-title').innerText = titleMap[tabName];

            const wrapper = document.getElementById('data-wrapper');
            wrapper.innerHTML = '<div class="text-dark col-12">Đang lấy dữ liệu thực tế từ Database...</div>';

            let apiUrl = `/api/personal/${tabName}?userId=660d1a2b9f1a2c3d4e5f6001`;
            if (tabName === 'all-songs') {
                apiUrl = '/api/songs/search?q='; 
            }

            fetchData(apiUrl, tabName);
        }

        function fetchData(url, tabName) {
            const wrapper = document.getElementById('data-wrapper');

            fetch(url)
                .then(response => response.json())
                .then(res => {
                    let realList = res.data || [];

                    if (tabName === 'all-songs' && realList.length === 0 && !url.includes('q=')) {
                        // Thử tìm các bài chứa chữ 'u' (phù hợp với cả 'user123' và 'Chúng Ta Của Tương Lai')
                        fetchData('/api/songs/search?q=u', tabName);
                        return;
                    }

                    if (tabName !== 'all-songs' && realList.length === 0 && url.includes('userId=660d1a2b9f1a2c3d4e5f6001')) {
                        let fallbackUrl = `/api/personal/${tabName}?userId=user123`;
                        fetchData(fallbackUrl, tabName);
                        return;
                    }

                    wrapper.innerHTML = '';

                    if (realList.length === 0) {
                        wrapper.innerHTML = `<div class="text-secondary col-12">Mục này hiện chưa có dữ liệu tương thích trong bảng.</div>`;
                        return;
                    }

                    realList.forEach(item => {
                        const name = item.title || item.name || "Không có tên";
                        const sub = item.artist || (item.type ? item.type : "Danh mục cá nhân") || "Ẩn danh";
                        
                        const img = item.coverUrl || "https://images.unsplash.com/photo-1539628399243-734011af5b83?w=300"; 

                        const cardHtml = `
                            <div class="col">
                                <div class="card-custom">
                                    <img src="${img}" alt="${name}">
                                    <div class="card-title">${name}</div>
                                    <div class="card-subtitle">${sub}</div>
                                </div>
                            </div>
                        `;
                        wrapper.innerHTML += cardHtml;
                    });
                })
                .catch(err => {
                    console.error(err);
                    wrapper.innerHTML = '<div class="text-danger col-12">Lỗi kết nối Server Backend rồi bạn ơi!</div>';
                });
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadData('all-songs', document.querySelector('.nav-link'));
        });
    </script>
</body>
</html>
