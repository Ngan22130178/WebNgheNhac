# ===================================================================
# THÔNG TIN ỨNG DỤNG
# ===================================================================
# Tên hiển thị của dự án trong các log hệ thống
spring.application.name=musicweb
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG

# ===================================================================
# CẤU HÌNH CƠ SỞ DỮ LIỆU H2 (LƯU FILE)
# Thay vì nằm trong RAM (biến mất khi tắt app), dữ liệu sẽ lưu thành file trong thư mục 'data/'
# ===================================================================
# URL kết nối: Lưu vào file trong thư mục dự án; DB_CLOSE_DELAY=-1 giữ kết nối khi không có user
spring.datasource.url=jdbc:h2:file:./data/musicdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# Driver kết nối tới database H2
spring.datasource.driverClassName=org.h2.Driver
# Tài khoản mặc định để truy cập console H2
spring.datasource.username=sa
# Mật khẩu mặc định
spring.datasource.password=

# ===================================================================
# CẤU HÌNH H2 CONSOLE (GIAO DIỆN QUẢN TRỊ DATABASE)
# ===================================================================
# Cho phép bật bảng điều khiển H2 trên trình duyệt
spring.h2.console.enabled=true
# Đường dẫn truy cập console (Ví dụ: http://localhost:8080/h2-console)
spring.h2.console.path=/h2-console

# ===================================================================
# CẤU HÌNH HIBERNATE & JPA
# ===================================================================
# Tự động cập nhật cấu trúc bảng trong DB dựa trên các Class Model của bạn
spring.jpa.hibernate.ddl-auto=update
# Hiển thị các câu lệnh SQL lên console để bạn tiện theo dõi quá trình xử lý
spring.jpa.show-sql=true

# ===================================================================
# CẤU HÌNH MVC (GIAO DIỆN & TÀI NGUYÊN)
# ===================================================================
# Thư mục chứa các file JSP của bạn
spring.mvc.view.prefix=/WEB-INF/views/
# Đuôi file view mặc định
spring.mvc.view.suffix=.jsp
# Đường dẫn tới các file tĩnh (CSS, JS, Hình ảnh) trong thư mục resources
spring.web.resources.static-locations=classpath:/static/

# ===================================================================
# CẤU HÌNH SECURITY (TẠM THỜI)
# ===================================================================
# Tên đăng nhập mặc định (sẽ thay thế khi bạn làm xong hệ thống Đăng nhập thực tế)
#spring.security.user.name=admin
# Mật khẩu mặc định
#spring.security.user.password=123456

# ===================================================================
# ID VÀ MẬT KHẨU (ĐỂ DÙNG ĐĂNG NHẬP GOOGLE OAUTH2)
# ===================================================================
spring.security.oauth2.client.registration.google.scope=profile,email

# Đổi cổng nếu muốn chạy ứng dụng trên cổng khác (mặc định là 8080)
#server.port=8081
